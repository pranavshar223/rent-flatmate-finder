services:
  - type: web
    name: rent-flatmate-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: EMAIL_ENABLED
        value: "true"
      - key: EMAIL_PROVIDER
        value: "brevo"
      - key: BREVO_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: "no-reply@rentflatmate.com"
